<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>État des lieux</title>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

  <style>
    :root {
      --bg: #fff8fc;
      --card: #ffffff;
      --line: #edd7ea;
      --text: #3a1f3f;
      --muted: #7f6b82;
      --violet: #8a4af3;
      --violet-dark: #6930c3;
      --rose: #ea5aa9;
      --rose-light: #fdebf5;
      --danger: #b42318;
      --danger-bg: #ffe9ec;
      --tab-bg: #f8ebf7;
      --ok: #5d2fc2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10pt;
      background: linear-gradient(180deg, #fff9fc 0%, #faf3ff 100%);
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 12px;
      background: linear-gradient(135deg, var(--violet-dark), var(--rose));
      color: white;
      box-shadow: 0 4px 14px rgba(105, 48, 195, 0.18);
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 15pt;
      line-height: 1.2;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .app-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 12px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 12px;
    }

    .sidebar {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 4px 14px rgba(138, 74, 243, 0.04);
      height: fit-content;
      position: sticky;
      top: 92px;
    }

    .sidebar h3 {
      margin: 0 0 8px;
      font-size: 11pt;
      color: var(--violet-dark);
    }

    .main-content {
      min-width: 0;
    }

    .container {
      max-width: 980px;
      padding: 0;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 4px 14px rgba(138, 74, 243, 0.04);
    }

    .grid {
      display: grid;
      gap: 10px;
    }

    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }

    @media (max-width: 980px) {
      .app-layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }

    @media (max-width: 900px) {
      .grid-2, .grid-3, .grid-4 {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: block;
      font-weight: 700;
      color: var(--violet-dark);
      margin-bottom: 4px;
    }

    input, select, textarea, button {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10pt;
    }

    input[type="text"],
    input[type="date"],
    textarea,
    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      color: var(--text);
    }

    textarea {
      min-height: 74px;
      resize: vertical;
    }

    input[type="file"] {
      width: 100%;
      padding: 6px 0;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 7px 10px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--violet), var(--rose));
      color: white;
      font-weight: 700;
      line-height: 1.2;
    }

    button.secondary {
      background: #f8eef9;
      color: var(--violet-dark);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    button.danger {
      background: var(--danger-bg);
      color: #a61b2b;
      border: 1px solid #f4cbd2;
      box-shadow: none;
    }

    button.ok {
      background: linear-gradient(135deg, var(--violet-dark), var(--violet));
    }

    .section-title {
      margin: 0 0 8px;
      font-size: 12pt;
      color: var(--violet-dark);
    }

    .small {
      font-size: 9pt;
      color: var(--muted);
    }

    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .tabbar {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      margin-bottom: 10px;
    }

    .tab-btn {
      flex: 1;
      min-width: 100px;
      background: var(--tab-bg);
      color: var(--violet-dark);
      border: 1px solid var(--line);
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--violet), var(--rose));
      color: white;
      border: 0;
    }

    .element-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fff;
    }

    .photo-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .photo-item {
      position: relative;
      display: inline-block;
    }

    .photo-preview img {
      width: 68px;
      height: 68px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
    }

    .signature-box {
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 10px;
      background: white;
    }

    canvas {
      width: 100%;
      height: 170px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 10px;
      touch-action: none;
    }

    .mention {
      margin-top: 6px;
      font-weight: 700;
      color: var(--violet-dark);
    }

    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 9pt;
      padding: 8px 0 20px;
    }

    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-top-space {
      margin-top: 8px;
    }

    .folder-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }

    .folder-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px;
      background: #fffafc;
    }

    .folder-title {
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text);
    }

    .folder-meta {
      font-size: 9pt;
      color: var(--muted);
      margin-bottom: 6px;
      white-space: normal;
      word-break: break-word;
    }

    .folder-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .sidebar-top-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .empty-state {
      color: var(--muted);
      font-size: 9pt;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>État des lieux</h1>
    <div class="toolbar">
      <button onclick="saveLocal()">Enregistrer localement</button>
      <button class="secondary" onclick="saveCurrentDocument()">Sauver ce dossier</button>
      <button class="secondary" onclick="exportJson()">Exporter JSON</button>
      <label class="secondary" style="display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:10px;cursor:pointer;">
        Importer JSON
        <input type="file" accept="application/json" onchange="importJson(event)" style="display:none;">
      </label>
      <button class="ok" onclick="generatePdf()">Exporter PDF</button>
      <button class="danger" onclick="resetApp()">Réinitialiser</button>
    </div>
  </header>

  <div class="app-layout">
    <aside class="sidebar">
      <h3>États des lieux enregistrés</h3>
      <div class="sidebar-top-actions">
        <button class="secondary" onclick="newDocument()">Nouveau</button>
        <button class="secondary" onclick="saveCurrentDocument()">Enregistrer</button>
      </div>
      <div id="savedFolders" class="folder-list"></div>
    </aside>

    <main class="main-content">
      <div class="container">
        <div class="card">
          <h2 class="section-title">Informations générales</h2>

          <div class="grid grid-3">
            <div>
              <label>Référence dossier</label>
              <input type="text" id="reference" placeholder="Ex. EDL-2026-001">
            </div>
            <div>
              <label>Date de l’état des lieux</label>
              <input type="date" id="dateEdl">
            </div>
            <div>
              <label>Type</label>
              <select id="typeEdl">
                <option>Entrée</option>
                <option>Sortie</option>
                <option selected>Comparatif entrée / sortie</option>
              </select>
            </div>
          </div>

          <div class="grid grid-2 mini-top-space">
            <div>
              <label>Bien / Adresse</label>
              <textarea id="adresse" placeholder="Adresse complète du bien"></textarea>
            </div>
            <div>
              <label>Observations générales</label>
              <textarea id="observations" placeholder="Commentaires généraux"></textarea>
            </div>
          </div>

          <div class="grid grid-3 mini-top-space">
            <div>
              <label>Bailleur / Propriétaire</label>
              <input type="text" id="proprietaire">
            </div>
            <div>
              <label>Locataire</label>
              <input type="text" id="locataire">
            </div>
            <div>
              <label>Mandataire / Agent / Représentant</label>
              <input type="text" id="agent">
            </div>
          </div>

          <div class="grid grid-3 mini-top-space">
            <div>
              <label>Date du bail</label>
              <input type="date" id="dateBail">
            </div>
            <div>
              <label>Date d’effet du bail</label>
              <input type="date" id="dateEffetBail">
            </div>
            <div>
              <label>Usage du bien</label>
              <input type="text" id="usageBien" placeholder="Ex. habitation">
            </div>
          </div>

          <div class="grid grid-4 mini-top-space">
            <div>
              <label>Relevé eau</label>
              <input type="text" id="releveEau">
            </div>
            <div>
              <label>Relevé électricité</label>
              <input type="text" id="releveElectricite">
            </div>
            <div>
              <label>Relevé gaz</label>
              <input type="text" id="releveGaz">
            </div>
            <div>
              <label>Nombre de clés</label>
              <input type="text" id="nombreCles">
            </div>
          </div>

          <div class="mini-top-space">
            <label>Moyens / dispositifs en place</label>
            <textarea id="dispositifs" placeholder="Ex. Alarme incendie, détecteur de fumée, fibre internet, interphone, badge, télécommande portail, visiophone..."></textarea>
          </div>
        </div>

        <div class="card">
          <div class="room-header">
            <div>
              <h2 class="section-title" style="margin-bottom:2px;">Pièces</h2>
              <div class="small">Affichage mobile avec onglets Entrée / Sortie.</div>
            </div>
            <div>
              <button onclick="addRoom()">Ajouter une pièce</button>
            </div>
          </div>

          <div id="rooms"></div>
        </div>

        <div class="card">
          <h2 class="section-title">Signatures</h2>
          <div class="grid grid-2">
            <div class="signature-box">
              <label>Signature bailleur / représentant</label>
              <canvas id="signatureLandlord"></canvas>
              <div class="mention">Lu et approuvé</div>
              <div class="mini-top-space">
                <button class="secondary" onclick="clearSignature('landlord')">Effacer</button>
              </div>
            </div>

            <div class="signature-box">
              <label>Signature locataire</label>
              <canvas id="signatureTenant"></canvas>
              <div class="mention">Lu et approuvé</div>
              <div class="mini-top-space">
                <button class="secondary" onclick="clearSignature('tenant')">Effacer</button>
              </div>
            </div>
          </div>
        </div>

        <div class="footer-note">
          Sauvegarde locale + répertoire des états des lieux + export JSON + PDF
        </div>
      </div>
    </main>
  </div>

  <script>
    const roomElementPresets = {
      standard: ['Sol', 'Murs', 'Plafond', 'Porte', 'Fenêtre', 'Électricité', 'Chauffage', 'Éclairage', 'Prises', 'Divers'],
      kitchen: ['Sol', 'Murs', 'Plafond', 'Porte', 'Fenêtre', 'Électricité', 'Évier', 'Robinetterie', 'Plan de travail', 'Meubles', 'Hotte', 'Divers'],
      bathroom: ['Sol', 'Murs', 'Plafond', 'Porte', 'Fenêtre', 'Électricité', 'Lavabo', 'Robinetterie', 'Douche / Baignoire', 'WC', 'VMC', 'Divers'],
      wc: ['Sol', 'Murs', 'Plafond', 'Porte', 'Fenêtre', 'Électricité', 'WC', 'Chasse d eau', 'VMC', 'Divers']
    };

    const statusOptions = ['Neuf', 'Très bon', 'Bon', 'Usage', 'Moyen', 'Mauvais', 'À remplacer', 'Absent'];
    const defaultRoomNames = ['Entrée', 'Séjour', 'Cuisine', 'Chambre', 'Salle de bain', 'WC'];

    const state = {
      rooms: [],
      currentTab: 'entry',
      currentDocumentId: null
    };

    let landlordPad = null;
    let tenantPad = null;

    function defaultElementsForRoomType(name) {
      const v = (name || '').toLowerCase();
      if (v.includes('cuisine')) return roomElementPresets.kitchen;
      if (v.includes('salle de bain') || v.includes('sdb')) return roomElementPresets.bathroom;
      if (v === 'wc' || v.includes('toilette')) return roomElementPresets.wc;
      return roomElementPresets.standard;
    }

    function createElement(name) {
      return {
        name,
        entry: { status: 'Bon', comment: '', photos: [] },
        exit: { status: 'Bon', comment: '', photos: [] }
      };
    }

    function createRoom(name) {
      return {
        id: crypto.randomUUID(),
        name,
        elements: defaultElementsForRoomType(name).map(createElement)
      };
    }

    function setDefaultRooms() {
      state.rooms = defaultRoomNames.map(createRoom);
      renderRooms();
      saveLocal();
    }

    function addRoom(name = 'Nouvelle pièce') {
      state.rooms.push(createRoom(name));
      renderRooms();
      saveLocal();
    }

    function removeRoom(id) {
      state.rooms = state.rooms.filter(r => r.id !== id);
      renderRooms();
      saveLocal();
    }

    function addElement(roomId) {
      const room = state.rooms.find(r => r.id === roomId);
      if (!room) return;
      room.elements.push(createElement('Nouvel élément'));
      renderRooms();
      saveLocal();
    }

    function removeElement(roomId, elementIndex) {
      const room = state.rooms.find(r => r.id === roomId);
      if (!room) return;
      room.elements.splice(elementIndex, 1);
      renderRooms();
      saveLocal();
    }

    function updateRoomName(roomId, value) {
      const room = state.rooms.find(r => r.id === roomId);
      if (!room) return;
      room.name = value;
      saveLocal();
    }

    function updateElementName(roomId, elementIndex, value) {
      const room = state.rooms.find(r => r.id === roomId);
      if (!room || !room.elements[elementIndex]) return;
      room.elements[elementIndex].name = value;
      saveLocal();
    }

    function updateElementField(roomId, elementIndex, side, field, value) {
      const room = state.rooms.find(r => r.id === roomId);
      if (!room || !room.elements[elementIndex]) return;
      room.elements[elementIndex][side][field] = value;
      saveLocal();
    }

    function switchTab(tab) {
      state.currentTab = tab;
      renderRooms();
      saveLocal();
    }

    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function roomTemplate(room) {
      return `
        <div class="card">
          <div class="room-header">
            <div style="flex:1;min-width:200px;">
              <input type="text" value="${escapeHtml(room.name)}" oninput="updateRoomName('${room.id}', this.value)" style="font-size:11pt;font-weight:700;">
            </div>
            <div class="inline-actions">
              <button class="danger" onclick="removeRoom('${room.id}')">Supprimer la pièce</button>
            </div>
          </div>

          <div class="tabbar">
            <button class="tab-btn ${state.currentTab === 'entry' ? 'active' : ''}" onclick="switchTab('entry')">Entrée</button>
            <button class="tab-btn ${state.currentTab === 'exit' ? 'active' : ''}" onclick="switchTab('exit')">Sortie</button>
          </div>

          <div>
            ${room.elements.map((element, index) => elementCardTemplate(room.id, element, index)).join('')}
          </div>

          <div class="mini-top-space">
            <button class="secondary" onclick="addElement('${room.id}')">Ajouter un élément</button>
          </div>
        </div>
      `;
    }

    function statusSelect(roomId, elementIndex, side, value) {
      return `
        <select onchange="updateElementField('${roomId}', ${elementIndex}, '${side}', 'status', this.value)">
          ${statusOptions.map(opt => `<option ${opt === value ? 'selected' : ''}>${opt}</option>`).join('')}
        </select>
      `;
    }

    function photosHtml(roomId, elementIndex, side, photos) {
      return `
        <div>
          <label>Photos</label>
          <input type="file" accept="image/*" capture="environment" multiple onchange="handlePhotos(event, '${roomId}', ${elementIndex}, '${side}')">
          <div class="photo-preview">
            ${photos.map((src, i) => `
              <div class="photo-item">
                <img src="${src}" alt="photo">
                <button
                  type="button"
                  onclick="removePhoto('${roomId}', ${elementIndex}, '${side}', ${i})"
                  style="position:absolute;top:-5px;right:-5px;padding:1px 5px;border-radius:999px;background:#ea5aa9;color:#fff;border:0;"
                >x</button>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function elementCardTemplate(roomId, element, index) {
      const side = state.currentTab;
      const current = element[side];

      return `
        <div class="element-card">
          <div class="grid grid-2">
            <div>
              <label>Élément</label>
              <input type="text" value="${escapeHtml(element.name)}" oninput="updateElementName('${roomId}', ${index}, this.value)">
            </div>
            <div>
              <label>État</label>
              ${statusSelect(roomId, index, side, current.status)}
            </div>
          </div>

          <div class="mini-top-space">
            <label>Commentaire ${side === 'entry' ? 'entrée' : 'sortie'}</label>
            <textarea oninput="updateElementField('${roomId}', ${index}, '${side}', 'comment', this.value)">${escapeHtml(current.comment)}</textarea>
          </div>

          <div class="mini-top-space">
            ${photosHtml(roomId, index, side, current.photos)}
          </div>

          <div class="mini-top-space">
            <button class="danger" onclick="removeElement('${roomId}', ${index})">Supprimer l’élément</button>
          </div>
        </div>
      `;
    }

    function renderRooms() {
      const container = document.getElementById('rooms');
      if (!container) return;
      container.innerHTML = state.rooms.map(roomTemplate).join('');
    }

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function handlePhotos(event, roomId, elementIndex, side) {
      const files = Array.from(event.target.files || []);
      if (!files.length) return;

      const room = state.rooms.find(r => r.id === roomId);
      if (!room || !room.elements[elementIndex]) return;

      for (const file of files) {
        const data = await toBase64(file);
        room.elements[elementIndex][side].photos.push(data);
      }

      renderRooms();
      saveLocal();
    }

    function removePhoto(roomId, elementIndex, side, photoIndex) {
      const room = state.rooms.find(r => r.id === roomId);
      if (!room || !room.elements[elementIndex]) return;
      room.elements[elementIndex][side].photos.splice(photoIndex, 1);
      renderRooms();
      saveLocal();
    }

    function collectFormData() {
      return {
        id: state.currentDocumentId,
        reference: document.getElementById('reference').value,
        dateEdl: document.getElementById('dateEdl').value,
        typeEdl: document.getElementById('typeEdl').value,
        adresse: document.getElementById('adresse').value,
        observations: document.getElementById('observations').value,
        proprietaire: document.getElementById('proprietaire').value,
        locataire: document.getElementById('locataire').value,
        agent: document.getElementById('agent').value,
        dateBail: document.getElementById('dateBail').value,
        dateEffetBail: document.getElementById('dateEffetBail').value,
        usageBien: document.getElementById('usageBien').value,
        releveEau: document.getElementById('releveEau').value,
        releveElectricite: document.getElementById('releveElectricite').value,
        releveGaz: document.getElementById('releveGaz').value,
        nombreCles: document.getElementById('nombreCles').value,
        dispositifs: document.getElementById('dispositifs').value,
        rooms: state.rooms,
        currentTab: state.currentTab,
        currentDocumentId: state.currentDocumentId,
        signatures: {
          landlord: landlordPad && !landlordPad.isEmpty() ? landlordPad.toDataURL() : '',
          tenant: tenantPad && !tenantPad.isEmpty() ? tenantPad.toDataURL() : ''
        }
      };
    }

    function saveLocal() {
      localStorage.setItem('edl-app-data', JSON.stringify(collectFormData()));
    }

    function hydrateFormData(data) {
      document.getElementById('reference').value = data.reference || '';
      document.getElementById('dateEdl').value = data.dateEdl || '';
      document.getElementById('typeEdl').value = data.typeEdl || 'Comparatif entrée / sortie';
      document.getElementById('adresse').value = data.adresse || '';
      document.getElementById('observations').value = data.observations || '';
      document.getElementById('proprietaire').value = data.proprietaire || '';
      document.getElementById('locataire').value = data.locataire || '';
      document.getElementById('agent').value = data.agent || '';
      document.getElementById('dateBail').value = data.dateBail || '';
      document.getElementById('dateEffetBail').value = data.dateEffetBail || '';
      document.getElementById('usageBien').value = data.usageBien || '';
      document.getElementById('releveEau').value = data.releveEau || '';
      document.getElementById('releveElectricite').value = data.releveElectricite || '';
      document.getElementById('releveGaz').value = data.releveGaz || '';
      document.getElementById('nombreCles').value = data.nombreCles || '';
      document.getElementById('dispositifs').value = data.dispositifs || '';
      state.rooms = Array.isArray(data.rooms) ? data.rooms : [];
      state.currentTab = data.currentTab || 'entry';
      state.currentDocumentId = data.currentDocumentId || data.id || null;

      renderRooms();

      setTimeout(() => {
        if (landlordPad) landlordPad.clear();
        if (tenantPad) tenantPad.clear();
        if (data.signatures && data.signatures.landlord && landlordPad) landlordPad.fromDataURL(data.signatures.landlord);
        if (data.signatures && data.signatures.tenant && tenantPad) tenantPad.fromDataURL(data.signatures.tenant);
      }, 60);
    }

    function loadLocal() {
      const raw = localStorage.getItem('edl-app-data');

      if (!raw) {
        setDefaultRooms();
        return;
      }

      try {
        const data = JSON.parse(raw);
        if (!data || !Array.isArray(data.rooms) || data.rooms.length === 0) {
          setDefaultRooms();
          return;
        }
        hydrateFormData(data);
      } catch (e) {
        setDefaultRooms();
      }
    }

    function exportJson() {
      const payload = collectFormData();
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (payload.reference || 'etat-des-lieux') + '.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importJson(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!data.id) data.id = crypto.randomUUID();
          state.currentDocumentId = data.id;
          hydrateFormData(data);
          saveLocal();
          saveCurrentDocument(true);
        } catch (e) {
          alert('Fichier JSON invalide');
        }
      };
      reader.readAsText(file);
    }

    function clearSignature(side) {
      if (side === 'landlord' && landlordPad) landlordPad.clear();
      if (side === 'tenant' && tenantPad) tenantPad.clear();
      saveLocal();
    }

    function resetApp() {
      if (!confirm('Tout effacer ?')) return;
      localStorage.removeItem('edl-app-data');
      state.currentDocumentId = null;
      location.reload();
    }

    function setupSignaturePad() {
      const landlordCanvas = document.getElementById('signatureLandlord');
      const tenantCanvas = document.getElementById('signatureTenant');

      function resizeCanvas(canvas) {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * ratio;
        canvas.height = rect.height * ratio;
        const ctx = canvas.getContext('2d');
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(ratio, ratio);
      }

      resizeCanvas(landlordCanvas);
      resizeCanvas(tenantCanvas);

      landlordPad = new SignaturePad(landlordCanvas);
      tenantPad = new SignaturePad(tenantCanvas);

      landlordCanvas.addEventListener('mouseup', saveLocal);
      tenantCanvas.addEventListener('mouseup', saveLocal);
      landlordCanvas.addEventListener('touchend', saveLocal);
      tenantCanvas.addEventListener('touchend', saveLocal);

      window.addEventListener('resize', () => {
        const landlordData = landlordPad && !landlordPad.isEmpty() ? landlordPad.toDataURL() : null;
        const tenantData = tenantPad && !tenantPad.isEmpty() ? tenantPad.toDataURL() : null;

        resizeCanvas(landlordCanvas);
        resizeCanvas(tenantCanvas);

        landlordPad = new SignaturePad(landlordCanvas);
        tenantPad = new SignaturePad(tenantCanvas);

        if (landlordData) landlordPad.fromDataURL(landlordData);
        if (tenantData) tenantPad.fromDataURL(tenantData);
      });
    }

    function getSavedDocuments() {
      try {
        return JSON.parse(localStorage.getItem('edl-documents') || '[]');
      } catch (e) {
        return [];
      }
    }

    function setSavedDocuments(docs) {
      localStorage.setItem('edl-documents', JSON.stringify(docs));
    }

    function renderSavedFolders() {
      const container = document.getElementById('savedFolders');
      if (!container) return;

      const docs = getSavedDocuments();

      if (!docs.length) {
        container.innerHTML = '<div class="empty-state">Aucun état des lieux enregistré.</div>';
        return;
      }

      container.innerHTML = docs.map(doc => `
        <div class="folder-item">
          <div class="folder-title">${escapeHtml(doc.reference || 'Sans référence')}</div>
          <div class="folder-meta">
            ${escapeHtml(doc.dateEdl || '')}<br>
            ${escapeHtml(doc.adresse || '')}
          </div>
          <div class="folder-actions">
            <button class="secondary" onclick="openSavedDocument('${doc.id}')">Ouvrir</button>
            <button class="secondary" onclick="duplicateSavedDocument('${doc.id}')">Dupliquer</button>
            <button class="danger" onclick="deleteSavedDocument('${doc.id}')">Supprimer</button>
          </div>
        </div>
      `).join('');
    }

    function saveCurrentDocument(silent = false) {
      const payload = collectFormData();
      const docs = getSavedDocuments();

      if (!state.currentDocumentId) {
        state.currentDocumentId = crypto.randomUUID();
      }

      payload.id = state.currentDocumentId;
      payload.currentDocumentId = state.currentDocumentId;
      payload.savedAt = new Date().toISOString();

      const existingIndex = docs.findIndex(d => d.id === payload.id);

      if (existingIndex >= 0) {
        docs[existingIndex] = payload;
      } else {
        docs.unshift(payload);
      }

      setSavedDocuments(docs);
      saveLocal();
      renderSavedFolders();

      if (!silent) {
        alert('État des lieux enregistré dans le répertoire');
      }
    }

    function openSavedDocument(id) {
      const docs = getSavedDocuments();
      const doc = docs.find(d => d.id === id);
      if (!doc) return;

      state.currentDocumentId = doc.id;
      hydrateFormData(doc);
      saveLocal();
    }

    function deleteSavedDocument(id) {
      if (!confirm('Supprimer cet état des lieux ?')) return;

      const docs = getSavedDocuments().filter(d => d.id !== id);
      setSavedDocuments(docs);

      if (state.currentDocumentId === id) {
        state.currentDocumentId = null;
      }

      renderSavedFolders();
    }

    function duplicateSavedDocument(id) {
      const docs = getSavedDocuments();
      const doc = docs.find(d => d.id === id);
      if (!doc) return;

      const clone = JSON.parse(JSON.stringify(doc));
      clone.id = crypto.randomUUID();
      clone.currentDocumentId = clone.id;
      clone.reference = (clone.reference || 'Copie') + ' - copie';
      clone.savedAt = new Date().toISOString();

      docs.unshift(clone);
      setSavedDocuments(docs);
      renderSavedFolders();
    }

    function newDocument() {
      if (!confirm('Créer un nouvel état des lieux ?')) return;

      state.currentDocumentId = null;
      localStorage.removeItem('edl-app-data');

      document.getElementById('reference').value = '';
      document.getElementById('dateEdl').valueAsDate = new Date();
      document.getElementById('typeEdl').value = 'Comparatif entrée / sortie';
      document.getElementById('adresse').value = '';
      document.getElementById('observations').value = '';
      document.getElementById('proprietaire').value = '';
      document.getElementById('locataire').value = '';
      document.getElementById('agent').value = '';
      document.getElementById('dateBail').value = '';
      document.getElementById('dateEffetBail').value = '';
      document.getElementById('usageBien').value = '';
      document.getElementById('releveEau').value = '';
      document.getElementById('releveElectricite').value = '';
      document.getElementById('releveGaz').value = '';
      document.getElementById('nombreCles').value = '';
      document.getElementById('dispositifs').value = '';

      if (landlordPad) landlordPad.clear();
      if (tenantPad) tenantPad.clear();

      setDefaultRooms();
      renderSavedFolders();
    }

    function getImageFormat(dataUrl) {
      if (!dataUrl || typeof dataUrl !== 'string') return 'JPEG';
      if (dataUrl.startsWith('data:image/png')) return 'PNG';
      if (dataUrl.startsWith('data:image/webp')) return 'WEBP';
      return 'JPEG';
    }

    async function generatePdf() {
      const payload = collectFormData();
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'mm', format: 'a4' });

      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const left = 12;
      let y = 12;

      function addPageNumbers() {
        const count = doc.getNumberOfPages();
        for (let i = 1; i <= count; i++) {
          doc.setPage(i);
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(9);
          doc.text(`Page ${i} / ${count}`, pageWidth - 28, pageHeight - 8);
        }
      }

      function ensureSpace(heightNeeded = 10) {
        if (y + heightNeeded > 275) {
          doc.addPage();
          y = 12;
        }
      }

      function line(text, size = 10, bold = false) {
        doc.setFont('helvetica', bold ? 'bold' : 'normal');
        doc.setFontSize(size);
        const lines = doc.splitTextToSize(String(text || ''), 185);
        ensureSpace(lines.length * 5 + 2);
        doc.text(lines, left, y);
        y += lines.length * 5 + 1;
      }

      function block(title, content) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        ensureSpace(12);
        doc.text(title, left, y);
        y += 5;

        doc.setFont('helvetica', 'normal');
        const lines = doc.splitTextToSize(String(content || ''), 183);
        const height = Math.max(8, lines.length * 5 + 4);
        ensureSpace(height + 2);

        doc.rect(left, y - 4, 185, height);
        doc.text(lines, left + 2, y);
        y += height + 4;
      }

      function twoCols(title, leftTxt, rightTxt) {
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10);
        ensureSpace(12);
        doc.text(title, left, y);
        y += 5;

        doc.setFont('helvetica', 'normal');
        const leftLines = doc.splitTextToSize(leftTxt || '', 86);
        const rightLines = doc.splitTextToSize(rightTxt || '', 86);
        const h = Math.max(leftLines.length, rightLines.length) * 5 + 4;

        ensureSpace(h + 2);

        doc.rect(left, y - 4, 88, h);
        doc.rect(109, y - 4, 88, h);
        doc.text(leftLines, left + 2, y);
        doc.text(rightLines, 111, y);
        y += h + 4;
      }

      async function addPhotoGallery(title, photos) {
        if (!photos || !photos.length) return;

        line(title, 10, true);

        const imgWidth = 40;
        const imgHeight = 30;
        const gap = 6;
        const perRow = 4;
        let col = 0;

        for (let i = 0; i < photos.length; i++) {
          const photo = photos[i];
          const format = getImageFormat(photo);

          if (col === 0) {
            ensureSpace(imgHeight + 8);
          }

          const x = left + col * (imgWidth + gap);

          try {
            doc.addImage(photo, format, x, y, imgWidth, imgHeight);
          } catch (e) {
            doc.setFont('helvetica', 'italic');
            doc.setFontSize(9);
            doc.text('[Photo non insérée]', x, y + 10);
          }

          col++;

          if (col >= perRow) {
            col = 0;
            y += imgHeight + 6;
          }
        }

        if (col !== 0) {
          y += imgHeight + 6;
        }
      }

      line('ÉTAT DES LIEUX', 15, true);
      line('Référence : ' + (payload.reference || ''), 10, true);
      line('Date de l’état des lieux : ' + (payload.dateEdl || '') + ' - Type : ' + (payload.typeEdl || ''));
      line('Adresse du bien : ' + (payload.adresse || ''));
      line('Bailleur / Propriétaire : ' + (payload.proprietaire || ''));
      line('Locataire : ' + (payload.locataire || ''));
      line('Mandataire / Agent / Représentant : ' + (payload.agent || ''));
      line('Date du bail : ' + (payload.dateBail || ''));
      line('Date d’effet du bail : ' + (payload.dateEffetBail || ''));
      line('Usage du bien : ' + (payload.usageBien || ''));
      line('Observations générales : ' + (payload.observations || ''));

      block(
        'Relevés et informations',
        'Relevé eau : ' + (payload.releveEau || '') + '\n' +
        'Relevé électricité : ' + (payload.releveElectricite || '') + '\n' +
        'Relevé gaz : ' + (payload.releveGaz || '') + '\n' +
        'Nombre de clés remises / restituées : ' + (payload.nombreCles || '') + '\n' +
        'Moyens / dispositifs en place : ' + (payload.dispositifs || '')
      );

      doc.addPage();
      y = 12;

      line('Mentions légales', 13, true);

      block(
        'Établissement de l’état des lieux',
        "Le présent état des lieux est établi contradictoirement entre les parties, en application du bail d’habitation mentionné au présent document. Il décrit l’état du logement, de ses pièces, de ses équipements et des éléments qui le composent à la date de réalisation de l’état des lieux."
      );

      block(
        'Lien avec le bail',
        "Le présent document est annexé au contrat de bail ou établi dans le cadre de son exécution. Il pourra être utilisé pour comparer l’état du logement lors de l’entrée et de la sortie des lieux, conformément aux obligations réciproques du bailleur et du locataire."
      );

      block(
        'Constats et pièces jointes',
        "Les relevés de compteurs, le nombre de clés, les dispositifs présents dans le logement, les observations, ainsi que les photographies annexées au présent état des lieux font partie intégrante des constats établis entre les parties."
      );

      block(
        'Validation',
        "Les parties reconnaissent avoir pris connaissance du présent état des lieux, l’avoir vérifié, lu et approuvé. Elles déclarent que les mentions portées reflètent les constatations effectuées sur place à la date de signature."
      );

      const rooms = Array.isArray(payload.rooms) ? payload.rooms : [];

      for (const room of rooms) {
        doc.addPage();
        y = 12;

        line('Pièce : ' + (room.name || ''), 13, true);

        const elements = Array.isArray(room.elements) ? room.elements : [];

        for (const element of elements) {
          twoCols(
            'Élément : ' + (element.name || ''),
            'ENTRÉE\nÉtat : ' + (element.entry?.status || '') + '\nCommentaire : ' + (element.entry?.comment || ''),
            'SORTIE\nÉtat : ' + (element.exit?.status || '') + '\nCommentaire : ' + (element.exit?.comment || '')
          );

          await addPhotoGallery(
            'Photos entrée - ' + (element.name || ''),
            element.entry?.photos || []
          );

          await addPhotoGallery(
            'Photos sortie - ' + (element.name || ''),
            element.exit?.photos || []
          );
        }
      }

      doc.addPage();
      y = 12;

      line('Signatures', 13, true);
      line('Mention légale : Lu et approuvé.', 10, true);

      if (payload.signatures.landlord) {
        line('Bailleur / représentant', 10, true);
        try {
          doc.addImage(payload.signatures.landlord, 'PNG', 12, y, 80, 30);
        } catch (e) {}
        y += 34;
        line('Lu et approuvé');
      }

      if (payload.signatures.tenant) {
        y += 4;
        line('Locataire', 10, true);
        try {
          doc.addImage(payload.signatures.tenant, 'PNG', 12, y, 80, 30);
        } catch (e) {}
        y += 34;
        line('Lu et approuvé');
      }

      addPageNumbers();
      doc.save((payload.reference || 'etat-des-lieux') + '.pdf');
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupSignaturePad();
      document.getElementById('dateEdl').valueAsDate = new Date();
      loadLocal();
      renderSavedFolders();
    });
  </script>
</body>
</html>
